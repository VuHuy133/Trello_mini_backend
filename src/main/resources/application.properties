# Hibernate auto schema update

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400}
spring.application.name=Trello_mini
server.port=8088
server.address=0.0.0.0
spring.main.allow-bean-definition-overriding=true

# MySQL Database Configuration (local dev — port 3307 because 3306 is taken on host)
spring.datasource.url=jdbc:mysql://localhost:3307/trello?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Redis Configuration (local dev)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

# SQL Initialization
spring.sql.init.mode=never

spring.thymeleaf.cache=false
spring.devtools.restart.enabled=true

# Mail - Mailpit (local dev)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.mime.charset=UTF-8

# Scheduling Configuration
spring.task.scheduling.pool.size=2
spring.task.scheduling.thread-name-prefix=trello-scheduler-

# OAuth2 Google Login Configuration
# Generate credentials at: https://console.cloud.google.com/
# Redirect URI: http://localhost:8088/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.provider.google.user-name-attribute=sub