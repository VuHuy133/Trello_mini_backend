# ============================================================
# Development Environment Profile
# ============================================================

# Enable automatic data seeding on startup
seed.data.on-startup=true

# ============================================================
# Local Development Database (MySQL on port 3307)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3307/trello?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ============================================================
# Local Redis
# ============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

# ============================================================
# Local Mail (Mailpit) - Development
# ============================================================
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ============================================================
# Development Settings
# ============================================================
server.port=8088
spring.thymeleaf.cache=false
spring.devtools.restart.enabled=true
logging.level.root=INFO
logging.level.com.trello=DEBUG
