<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết dự án - Trello Mini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fafbfc; font-family: 'Segoe UI', sans-serif; }
        .board-container { display: flex; gap: 16px; overflow-x: auto; padding: 20px 0; }
        .board-column { flex: 0 0 320px; background: #f0f2f5; border-radius: 6px; padding: 12px; min-height: 400px; display: flex; flex-direction: column; }
        .column-header { font-weight: 600; font-size: 13px; color: #333; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .column-badge { background: #e9ecef; border-radius: 10px; padding: 2px 8px; font-size: 12px; color: #666; }
        .task-item { background: white; border: 1px solid #e1e4e8; border-radius: 6px; padding: 10px; margin-bottom: 8px; cursor: pointer; }
        .task-item:hover { border-color: #007bff; }
        .task-title { font-weight: 600; font-size: 13px; color: #333; margin-bottom: 6px; }
        .task-meta { display: flex; justify-content: space-between; align-items: center; font-size: 11px; gap: 8px; }
        .task-meta-left { display: flex; flex-direction: column; gap: 4px; }
        .task-meta-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .priority-badge { padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; }
        .priority-high { background: #ffe6e6; color: #c41e3a; }
        .priority-medium { background: #fff4e6; color: #d97706; }
        .priority-low { background: #e6f3ff; color: #0066cc; }
        .add-task-btn { background: #f8f9fa; border: 1px dashed #ccc; border-radius: 6px; padding: 8px; text-align: center; color: #666; font-size: 13px; margin-top: auto; text-decoration: none; display: block; }
        .add-task-btn:hover { border-color: #007bff; color: #007bff; }
        .project-stats span { font-size: 14px; color: #666; }
    </style>
</head>
<body>

    <nav class="navbar navbar-light bg-white border-bottom py-3">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-primary" href="/projects">TRELLO MINI</a>
            <div class="d-flex align-items-center gap-3">
                <a th:if="${session.user != null && session.user.role == 'ADMIN'}" href="/admin" class="btn btn-sm btn-primary text-white">Dashboard</a>
                <span class="text-muted" th:text="${session.user != null ? session.user.fullName : 'User'}">User</span>
                <a href="/logout" class="btn btn-sm btn-danger text-white">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 mt-4">
        <div class="d-flex justify-content-between align-items-start mb-2">
            <div>
                <h3 class="fw-bold mb-1" th:text="${project.name}">Dự án</h3>
                <p class="text-muted small" th:text="${project.description}">Mô tả</p>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <!-- Nút Tham gia / Rời dự án -->
                <form th:if="${!isMember and project.type != 'PRIVATE'}" th:action="@{'/projects/' + ${project.id} + '/join'}" method="post">
                    <button type="submit" class="btn btn-success btn-sm">Tham gia dự án</button>
                </form>
                <span th:if="${!isMember and project.type == 'PRIVATE'}" class="badge bg-secondary">Project PRIVATE: cần ADMIN mời</span>
                <form th:if="${isMember}" th:action="@{'/projects/' + ${project.id} + '/leave'}" method="post">
                    <button type="submit" class="btn btn-outline-warning btn-sm" onclick="return confirm('Bạn có chắc muốn rời dự án này?')">Rời dự án</button>
                </form>

                <a th:if="${session.user != null && session.user.role == 'ADMIN'}" class="btn btn-outline-danger btn-sm" th:href="@{'/projects/' + ${project.id} + '/delete'}" onclick="return confirm('Bạn có chắc muốn xóa dự án này?')">Xóa dự án</a>
            </div>
        </div>

        <div class="d-flex gap-4 mb-3 project-stats">
            <span th:text="${taskStats.total} + ' công việc'">0 công việc</span>
            <span th:text="${taskStats.completed} + ' hoàn thành'">0 hoàn thành</span>
            <span th:text="${memberCount} + ' thành viên'">0 thành viên</span>
            <span th:text="${taskStats.percentage} + '%'">0%</span>
        </div>

        <div class="board-container">

            <!-- TO DO -->
            <div class="board-column">
                <div class="column-header">
                    <span>TO DO</span>
                    <span class="column-badge" th:text="${#lists.size(todoTasks)}">0</span>
                </div>
                <div class="task-item" th:each="task : ${todoTasks}" th:onclick="'window.location.href=\'/tasks/' + ${task.id} + '\''">
                    <div class="task-meta">
                        <div class="task-meta-left">
                            <div class="task-title" th:text="${task.title}">Task</div>
                            <span class="priority-badge"
                                  th:classappend="${task.priority == 'HIGH' ? 'priority-high' : (task.priority == 'MEDIUM' ? 'priority-medium' : 'priority-low')}"
                                  th:text="${task.priority == 'HIGH' ? 'Cao' : (task.priority == 'MEDIUM' ? 'TB' : 'Thấp')}">-</span>
                        </div>
                        <div class="task-meta-right">
                            <span class="small text-muted" th:text="'Người tạo: ' + (${task.user != null ? task.user.fullName : '-'})">Người tạo</span>
                            <span class="small text-muted" th:text="'Người thực hiện: ' + (${task.assignee != null ? task.assignee.fullName : '-'})">Người thực hiện</span>
                        </div>
                    </div>
                </div>
                <a th:href="@{'/tasks/create?projectId=' + ${project.id} + '&status=TODO'}" class="add-task-btn">+ Thêm</a>
            </div>

            <!-- DOING -->
            <div class="board-column">
                <div class="column-header">
                    <span>DOING</span>
                    <span class="column-badge" th:text="${#lists.size(doingTasks)}">0</span>
                </div>
                <div class="task-item" th:each="task : ${doingTasks}" th:onclick="'window.location.href=\'/tasks/' + ${task.id} + '\''">
                    <div class="task-meta">
                        <div class="task-meta-left">
                            <div class="task-title" th:text="${task.title}">Task</div>
                            <span class="priority-badge"
                                  th:classappend="${task.priority == 'HIGH' ? 'priority-high' : (task.priority == 'MEDIUM' ? 'priority-medium' : 'priority-low')}"
                                  th:text="${task.priority == 'HIGH' ? 'Cao' : (task.priority == 'MEDIUM' ? 'TB' : 'Thấp')}">-</span>
                        </div>
                        <div class="task-meta-right">
                            <span class="small text-muted" th:text="'Người tạo: ' + (${task.user != null ? task.user.fullName : '-'})">Người tạo</span>
                            <span class="small text-muted" th:text="'Người thực hiện: ' + (${task.assignee != null ? task.assignee.fullName : '-'})">Người thực hiện</span>
                        </div>
                    </div>
                </div>
                <a th:href="@{'/tasks/create?projectId=' + ${project.id} + '&status=DOING'}" class="add-task-btn">+ Thêm</a>
            </div>

            <!-- DONE -->
            <div class="board-column">
                <div class="column-header">
                    <span>DONE</span>
                    <span class="column-badge" th:text="${#lists.size(doneTasks)}">0</span>
                </div>
                <div class="task-item" th:each="task : ${doneTasks}" th:onclick="'window.location.href=\'/tasks/' + ${task.id} + '\''">
                    <div class="task-meta">
                        <div class="task-meta-left">
                            <div class="task-title" th:text="${task.title}">Task</div>
                            <span class="priority-badge"
                                  th:classappend="${task.priority == 'HIGH' ? 'priority-high' : (task.priority == 'MEDIUM' ? 'priority-medium' : 'priority-low')}"
                                  th:text="${task.priority == 'HIGH' ? 'Cao' : (task.priority == 'MEDIUM' ? 'TB' : 'Thấp')}">-</span>
                        </div>
                        <div class="task-meta-right">
                            <span class="small text-muted" th:text="'Người tạo: ' + (${task.user != null ? task.user.fullName : '-'})">Người tạo</span>
                            <span class="small text-muted" th:text="'Người thực hiện: ' + (${task.assignee != null ? task.assignee.fullName : '-'})">Người thực hiện</span>
                        </div>
                    </div>
                </div>
                <a th:href="@{'/tasks/create?projectId=' + ${project.id} + '&status=DONE'}" class="add-task-btn">+ Thêm</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
