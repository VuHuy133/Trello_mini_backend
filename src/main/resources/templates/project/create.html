<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo dự án mới - Trello Mini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f5f7fa; 
            font-family: 'Segoe UI', sans-serif;
        }
        
        .navbar-custom {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .form-container {
            max-width: 800px;
            margin: 30px auto;
        }
        
        .form-card {
            background: white;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            padding: 30px;
        }
        
        .form-title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }
        
        .form-control, .form-select, textarea {
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
        }
        
        .form-control:focus, .form-select:focus, textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e1e4e8;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #dee2e6;
        }
        
        .help-text {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .form-section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-top: 20px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e1e4e8;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar-custom">
        <div class="container-fluid px-4">
            <div class="d-flex justify-content-between align-items-center py-3">
                <a href="/projects" class="text-decoration-none fw-bold text-dark">Quay lại</a>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-muted" th:text="${session.user != null ? session.user.fullName : 'User'}">User</span>
                    <a href="/logout" class="btn btn-outline-danger" style="font-size: 12px; padding: 4px 12px;">Thoát</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="form-container">
        <div class="form-card">
            <h1 class="form-title">Tạo dự án mới</h1>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form method="post" action="/projects">
                
                <!-- Basic Information Section -->
                <div class="form-section-title">Thông tin cơ bản</div>

                <!-- Tên dự án -->
                <div class="form-group">
                    <label class="form-label">Tên dự án</label>
                    <input type="text" class="form-control" name="name" required 
                           placeholder="Nhập tên dự án...">
                    <div class="help-text">Tên dự án nên ngắn gọn và mô tả rõ nội dung</div>
                </div>

                <!-- Mô tả -->
                <div class="form-group">
                    <label class="form-label">Mô tả chi tiết</label>
                    <textarea class="form-control" name="description" 
                              placeholder="Nhập mô tả dự án..."></textarea>
                    <div class="help-text">Mô tả chi tiết mục tiêu và phạm vi của dự án</div>
                </div>

                <!-- Loại dự án -->
                <div class="form-group">
                    <label class="form-label">Loại dự án</label>
                    <select class="form-select" name="type" required>
                        <option value="">Chọn loại dự án...</option>
                        <option value="PUBLIC">Public - Công khai</option>
                        <option value="PRIVATE" selected>Private - Riêng tư</option>
                    </select>
                    <div class="help-text">Public: Ai có thể xem. Private: Chỉ thành viên dự án</div>
                </div>

                <!-- Form Actions -->
                <div class="form-actions">
                    <a href="/projects" class="btn btn-secondary">Hủy</a>
                    <button type="submit" class="btn btn-primary">Tạo dự án</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
