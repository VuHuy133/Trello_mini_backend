<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự án của tôi - TaskFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-w: 240px;
            --sidebar-bg: #0f172a;
            --accent: #3b82f6;
            --topbar-h: 64px;
            --body-bg: #f1f5f9;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --muted: #64748b;
        }
        * { box-sizing: border-box; }
        body { background: var(--body-bg); font-family: 'Segoe UI', -apple-system, sans-serif; color: var(--text); margin: 0; }

        /* ── Sidebar ── */
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0;
            width: var(--sidebar-w);
            background: var(--sidebar-bg);
            display: flex; flex-direction: column;
            z-index: 100; overflow-y: auto;
        }
        .sidebar-brand { padding: 20px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .brand-name { font-size: 17px; font-weight: 700; color: #fff; }
        .brand-sub { font-size: 11px; color: #94a3b8; }
        .sidebar-nav { padding: 16px 12px; flex: 1; }
        .nav-label { font-size: 10px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: .05em; padding: 10px 8px 4px; }
        .s-link {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: 8px;
            color: #94a3b8; text-decoration: none;
            font-size: 13.5px; font-weight: 500;
            transition: all .15s; margin-bottom: 2px;
        }
        .s-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .s-link.active { background: var(--accent); color: #fff; }
        .s-link i { width: 18px; text-align: center; font-size: 13px; }
        .sidebar-footer { padding: 12px; border-top: 1px solid rgba(255,255,255,0.08); }
        .logout-btn {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: 8px;
            color: #f87171; text-decoration: none;
            font-size: 13.5px; font-weight: 500; transition: all .15s; width: 100%;
        }
        .logout-btn:hover { background: rgba(248,113,113,0.1); color: #ef4444; }

        /* ── Main ── */
        .main-wrapper { margin-left: var(--sidebar-w); min-height: 100vh; display: flex; flex-direction: column; }

        /* ── Topbar ── */
        .topbar {
            height: var(--topbar-h); background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 24px; gap: 12px;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar-left { font-weight: 600; font-size: 15px; }
        .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
        .btn-create {
            background: var(--accent); color: white; border: none;
            border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600;
            text-decoration: none; display: flex; align-items: center; gap: 6px; transition: opacity .15s;
        }
        .btn-create:hover { opacity: .9; color: white; }
        .avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: var(--accent); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; flex-shrink: 0;
        }

        /* ── Content ── */
        .page-content { padding: 24px; flex: 1; }

        /* ── Section card ── */
        .sec-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .sec-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

        /* ── Project card ── */
        .proj-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-decoration: none; color: inherit; display: block; transition: all .15s; }
        .proj-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(59,130,246,.12); color: inherit; }
        .proj-card h6 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

        @media (max-width: 1200px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .main-wrapper { margin-left: 0; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-name"><i class="fas fa-check-square me-2" style="color:#60a5fa;"></i>TaskFlow</div>
            <div class="brand-sub">Quản lý công việc hiệu quả</div>
        </div>
        <div class="sidebar-nav">
            <div th:unless="${session.user.role == 'ADMIN'}">
                <div class="nav-label">Menu chính</div>
                <a href="/" class="s-link"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="/tasks" class="s-link"><i class="fas fa-tasks"></i> Công việc của tôi</a>
                <a href="/projects" class="s-link active"><i class="fas fa-folder"></i> Dự án của tôi</a>
            </div>
            <div th:if="${session.user.role == 'ADMIN'}">
                <div class="nav-label">Quản trị</div>
                <a href="/admin" class="s-link"><i class="fas fa-shield-alt"></i> Admin Dashboard</a>
                <a href="/admin/users" class="s-link"><i class="fas fa-users"></i> Quản lý users</a>
                <a href="/admin/projects" class="s-link"><i class="fas fa-sitemap"></i> Quản lý projects</a>
                <a href="/admin/tasks" class="s-link"><i class="fas fa-list-check"></i> Quản lý tasks</a>
            </div>
        </div>
        <div class="sidebar-footer">
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
        </div>
    </nav>

    <!-- Main wrapper -->
    <div class="main-wrapper">

        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-left">Dự án của tôi</div>
            <div class="topbar-right">
                <div class="avatar" th:text="${#strings.substring(session.user.fullName != null ? session.user.fullName : 'U', 0, 1).toUpperCase()}">U</div>
                <span class="text-muted small d-none d-md-inline" th:text="${session.user.fullName}">User</span>
            </div>
        </div>

        <!-- Page content -->
        <div class="page-content">
            <div class="sec-card">
                <div class="sec-title">Danh sách dự án của tôi</div>

                <div th:if="${#lists.isEmpty(projects)}" class="text-center text-muted py-5">
                    <i class="fas fa-folder-open fa-2x mb-2 d-block opacity-50"></i>
                    <p>Chưa có dự án nào</p>
                </div>

                <div class="grid" th:unless="${#lists.isEmpty(projects)}">
                    <a th:href="@{'/projects/' + ${project.id}}" th:each="project : ${projects}" class="proj-card">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h6 th:text="${project.name}">Project Name</h6>
                            <div class="d-flex gap-2">
                                <span th:if="${project.type == 'PUBLIC'}"  class="badge bg-info" style="font-size:10px;">PUBLIC</span>
                                <span th:if="${project.type == 'PRIVATE'}" class="badge bg-warning text-dark" style="font-size:10px;">PRIVATE</span>
                                <span th:if="${isMember[project.id]}"  class="badge bg-success" style="font-size:10px;">Đã tham gia</span>
                            </div>
                        </div>
                        <p class="text-muted mb-3" style="font-size:12px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;"
                           th:text="${project.description != null ? project.description : 'Chưa có mô tả'}"></p>
                        <div class="d-flex justify-content-between mb-1" style="font-size:12px; color:var(--muted);">
                            <span th:text="${taskCounts[project.id] != null ? taskCounts[project.id] : 0} + ' tasks'">0 tasks</span>
                            <span class="fw-semibold" th:text="${memberCounts[project.id] != null ? memberCounts[project.id] : 0} + ' members'">0 members</span>
                        </div>
                    </a>
                </div>
            </div>
        </div><!-- /page-content -->
    </div><!-- /main-wrapper -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
