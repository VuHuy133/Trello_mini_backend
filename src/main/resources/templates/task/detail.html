<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết công việc - Trello Mini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fafbfc; font-family: 'Segoe UI', sans-serif; }
        .priority-badge { padding: 2px 8px; border-radius: 3px; font-size: 12px; font-weight: 600; }
        .priority-high { background: #ffe6e6; color: #c41e3a; }
        .priority-medium { background: #fff4e6; color: #d97706; }
        .priority-low { background: #e6f3ff; color: #0066cc; }
        .section-card { background: white; border: 1px solid #e1e4e8; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
        .section-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
        .sidebar-label { font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase; margin-bottom: 6px; }
        .comment-item { padding: 12px 0; border-bottom: 1px solid #e1e4e8; }
        .comment-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <nav class="navbar navbar-light bg-white border-bottom py-3">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-primary" href="/">TRELLO MINI</a>
            <div class="d-flex align-items-center gap-3">
                <a th:if="${session.user != null && session.user.role == 'ADMIN'}" href="/admin" class="btn btn-sm btn-primary text-white">Dashboard</a>
                <span class="text-muted" th:text="${session.user != null ? session.user.fullName : 'User'}">User</span>
                <a href="/logout" class="btn btn-sm btn-danger text-white">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 mt-4">
        <div class="mb-3">
            <a th:href="@{'/projects/' + ${task.project?.id}}" class="text-decoration-none text-muted small">Quay lại dự án</a>
        </div>

        <div class="d-flex justify-content-between align-items-start mb-3">
            <h3 class="fw-bold" th:text="${task.title}">Công việc</h3>
            <a th:href="@{'/tasks/' + ${task.id} + '/edit'}" class="btn btn-sm btn-outline-secondary">Chỉnh sửa</a>
        </div>

        <div class="d-flex gap-3 mb-4 small">
            <span class="priority-badge"
                  th:classappend="${task.priority == 'HIGH' ? 'priority-high' : (task.priority == 'MEDIUM' ? 'priority-medium' : 'priority-low')}"
                  th:text="${task.priority == 'HIGH' ? 'Cao' : (task.priority == 'MEDIUM' ? 'TB' : 'Thấp')}">-</span>
            <span class="badge"
                  th:classappend="${task.status == 'TODO' ? 'bg-secondary' : (task.status == 'DOING' ? 'bg-warning' : 'bg-success')}"
                  th:text="${task.status == 'TODO' ? 'Chưa bắt đầu' : (task.status == 'DOING' ? 'Đang làm' : 'Hoàn thành')}">-</span>
        </div>

        <div class="row">
            <div class="col-md-8">
                <!-- Mô tả -->
                <div class="section-card">
                    <h5 class="section-title">Mô tả</h5>
                    <p class="text-muted" th:text="${task.description != null ? task.description : 'Chưa có mô tả'}">Mô tả</p>
                </div>

                <!-- Bình luận -->
                <div class="section-card">
                    <h5 class="section-title">Bình luận</h5>
                    <div th:if="${comments != null}" th:each="comment : ${comments}" class="comment-item">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="fw-bold small" th:text="${comment.user != null ? comment.user.fullName : 'Người dùng'}">User</span>
                            <span class="text-muted small" th:text="${comment.createdAt}">Thời gian</span>
                        </div>
                        <p class="mb-0 small text-muted" th:text="${comment.content}">Nội dung</p>
                    </div>
                    <div th:if="${comments == null || #lists.isEmpty(comments)}" class="text-muted small">Chưa có bình luận</div>
                    <form th:action="@{'/tasks/' + ${task.id} + '/comments'}" method="post" class="mt-3 pt-3 border-top">
                        <textarea class="form-control form-control-sm" name="content" rows="2" placeholder="Viết bình luận..."></textarea>
                        <button type="submit" class="btn btn-sm btn-primary mt-2">Gửi</button>
                    </form>
                </div>
            </div>

            <div class="col-md-4">
                <div class="section-card">
                    <div class="mb-3">
                        <span class="sidebar-label">Trạng thái</span>
                        <div th:text="${task.status}">TODO</div>
                    </div>
                    <div class="mb-3">
                        <span class="sidebar-label">Ưu tiên</span>
                        <div th:text="${task.priority}">MEDIUM</div>
                    </div>
                    <div class="mb-3" th:if="${task.user != null}">
                        <span class="sidebar-label">Người tạo</span>
                        <div th:text="${task.user.fullName}">-</div>
                    </div>
                    <div class="mb-3" th:if="${task.assignee != null}">
                        <span class="sidebar-label">Người thực hiện</span>
                        <div th:text="${task.assignee.fullName}">-</div>
                    </div>
                    <div class="mb-3" th:if="${task.dueDate != null}">
                        <span class="sidebar-label">Hạn chót</span>
                        <div th:text="${task.dueDate}">-</div>
                    </div>
                    <div>
                        <span class="sidebar-label">Dự án</span>
                        <a th:href="@{'/projects/' + ${task.project?.id}}" class="text-decoration-none" th:text="${task.project != null ? task.project.name : 'N/A'}">Dự án</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
