<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TaskFlow - Login</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
	<style>
		:root {
			--primary: #2563eb;
			--primary-dark: #1e40af;
			--primary-light: #3b82f6;
			--body-bg: #f8fafc;
			--card-bg: #ffffff;
			--border: #e2e8f0;
			--text: #0f172a;
			--muted: #475569;
		}
		
		* { box-sizing: border-box; }
		body { 
			background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
			font-family: 'Segoe UI', -apple-system, sans-serif;
			color: var(--text);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 20px;
		}
		
		.login-container {
			width: 100%;
			max-width: 420px;
		}
		
		.login-card {
			background: var(--card-bg);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 40px 32px;
			box-shadow: 0 10px 40px rgba(0,0,0,0.08);
		}
		
		.login-header {
			text-align: center;
			margin-bottom: 32px;
		}
		
		.brand-logo {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			margin-bottom: 16px;
		}
		
		.brand-logo i {
			font-size: 32px;
			color: var(--primary);
		}
		
		.brand-title {
			font-size: 24px;
			font-weight: 800;
			color: var(--text);
			margin: 0;
		}
		
		.login-subtitle {
			font-size: 14px;
			color: var(--muted);
			margin-top: 8px;
		}
		
		.form-floating > .form-control,
		.form-floating > .form-select {
			border: 1.5px solid var(--border);
			border-radius: 10px;
			background: #f8fafc;
			transition: all .2s;
		}
		
		.form-floating > .form-control:focus,
		.form-floating > .form-select:focus {
			border-color: var(--primary-light);
			background: white;
			box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
		}
		
		.form-floating > label {
			color: var(--muted);
			font-weight: 500;
		}
		
		.form-group {
			margin-bottom: 18px;
		}
		
		.form-check-input {
			border: 1.5px solid var(--border);
			border-radius: 6px;
			width: 18px;
			height: 18px;
		}
		
		.form-check-input:checked {
			background-color: var(--primary);
			border-color: var(--primary);
		}
		
		.form-check-label {
			font-size: 13px;
			color: var(--text);
			font-weight: 500;
			margin-left: 6px;
		}
		
		.btn-login {
			background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
			border: none;
			border-radius: 10px;
			padding: 11px 16px;
			font-size: 14px;
			font-weight: 700;
			color: white;
			width: 100%;
			transition: all .2s;
			box-shadow: 0 4px 12px rgba(37,99,235,0.25);
			margin-top: 8px;
			margin-bottom: 16px;
		}
		
		.btn-login:hover {
			opacity: 0.95;
			box-shadow: 0 6px 16px rgba(37,99,235,0.35);
			transform: translateY(-2px);
			color: white;
		}
		
		.divider {
			display: flex;
			align-items: center;
			margin: 24px 0;
			font-size: 13px;
			color: var(--muted);
		}
		
		.divider::before,
		.divider::after {
			content: '';
			flex: 1;
			height: 1px;
			background: var(--border);
		}
		
		.divider-text {
			padding: 0 12px;
			font-weight: 500;
		}
		
		.btn-google {
			border: 1.5px solid var(--border);
			border-radius: 10px;
			padding: 10px 16px;
			font-size: 14px;
			font-weight: 600;
			color: var(--text);
			background: white;
			width: 100%;
			transition: all .2s;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 8px;
		}
		
		.btn-google:hover {
			border-color: var(--primary);
			background: #f8fafc;
			color: var(--text);
		}
		
		.login-footer {
			text-align: center;
			padding-top: 20px;
			border-top: 1px solid var(--border);
			font-size: 13px;
		}
		
		.login-footer a {
			color: var(--primary);
			text-decoration: none;
			font-weight: 600;
		}
		
		.login-footer a:hover {
			text-decoration: underline;
		}
		
		.alert {
			border: none;
			border-radius: 10px;
			margin-bottom: 20px;
			font-size: 13px;
			font-weight: 500;
		}
		
		.alert-success {
			background: #f0fdf4;
			color: #166534;
			border-left: 4px solid #22c55e;
		}
		
		.alert-danger {
			background: #fef2f2;
			color: #991b1b;
			border-left: 4px solid #ef4444;
		}
		
		.alert-warning {
			background: #fffbeb;
			color: #b45309;
			border-left: 4px solid #f59e0b;
		}
	</style>
</head>
<body>

<div class="login-container">
	<div class="login-card">
		<!-- Header -->
		<div class="login-header">
			<div class="brand-logo">
				<i class="fas fa-check-square"></i>
			</div>
			<h1 class="brand-title">TaskFlow</h1>
			<p class="login-subtitle">Manage your workflow efficiently</p>
		</div>
		
		<!-- Alerts -->
		<div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
			<i class="fas fa-check-circle me-2"></i>Success! Please login to continue.
			<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
		</div>
		
		<div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
			<i class="fas fa-exclamation-circle me-2"></i>Invalid email or password
			<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
		</div>
		
		<div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
			<i class="fas fa-check-circle me-2"></i>Logged out successfully
			<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
		</div>
		
		<div th:if="${param.expire}" class="alert alert-warning alert-dismissible fade show" role="alert">
			<i class="fas fa-hourglass-end me-2"></i>Session expired. Please login again.
			<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
		</div>
		
		<!-- Login Form -->
		<form method="POST" th:action="@{/login}">
			<div class="form-group">
				<div class="form-floating">
					<input class="form-control" type="email" id="email" name="username" placeholder="Email" required>
					<label for="email"><i class="fas fa-envelope me-2"></i>Email Address</label>
				</div>
			</div>
			
			<div class="form-group">
				<div class="form-floating">
					<input class="form-control" type="password" id="password" name="password" placeholder="Password" required>
					<label for="password"><i class="fas fa-lock me-2"></i>Password</label>
				</div>
			</div>
			
			<div class="form-check mb-4">
				<input class="form-check-input" type="checkbox" id="remember" name="remember-me">
				<label class="form-check-label" for="remember">Remember me</label>
			</div>
			
			<button type="submit" class="btn btn-login">
				<i class="fas fa-arrow-right me-2"></i>Login
			</button>
		</form>
		
		<!-- Divider -->
		<div class="divider">
			<span class="divider-text">or</span>
		</div>
		
		<!-- OAuth2 Login -->
		<a href="/oauth2/authorization/google" class="btn-google">
			<i class="fab fa-google"></i>Continue with Google
		</a>
		
		<!-- Footer -->
		<div class="login-footer">
			Don't have an account? <a href="/register">Sign up here</a>
		</div>
	</div>
</div>

<script>
	// Handle OAuth2 token from URL parameter
	const token = new URLSearchParams(window.location.search).get('token');
	if (token) {
		localStorage.setItem('jwtToken', token);
		window.location.href = '/';
	}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
