<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TaskFlow - Sign Up</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
	<style>
		:root {
			--primary: #2563eb;
			--primary-dark: #1e40af;
			--primary-light: #3b82f6;
			--success: #10b981;
			--body-bg: #f8fafc;
			--card-bg: #ffffff;
			--border: #e2e8f0;
			--text: #0f172a;
			--muted: #475569;
		}
		
		* { box-sizing: border-box; }
		body { 
			background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
			font-family: 'Segoe UI', -apple-system, sans-serif;
			color: var(--text);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 20px;
		}
		
		.register-container {
			width: 100%;
			max-width: 460px;
		}
		
		.register-card {
			background: var(--card-bg);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 40px 32px;
			box-shadow: 0 10px 40px rgba(0,0,0,0.08);
		}
		
		.register-header {
			text-align: center;
			margin-bottom: 28px;
		}
		
		.brand-logo {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			margin-bottom: 16px;
		}
		
		.brand-logo i {
			font-size: 32px;
			color: var(--primary);
		}
		
		.brand-title {
			font-size: 24px;
			font-weight: 800;
			color: var(--text);
			margin: 0;
		}
		
		.register-subtitle {
			font-size: 14px;
			color: var(--muted);
			margin-top: 8px;
		}
		
		.form-floating > .form-control,
		.form-floating > .form-select {
			border: 1.5px solid var(--border);
			border-radius: 10px;
			background: #f8fafc;
			transition: all .2s;
			font-size: 13px;
		}
		
		.form-floating > .form-control:focus,
		.form-floating > .form-select:focus {
			border-color: var(--primary-light);
			background: white;
			box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
		}
		
		.form-floating > label {
			color: var(--muted);
			font-weight: 500;
			font-size: 13px;
		}
		
		.form-group {
			margin-bottom: 14px;
		}
		
		.btn-register {
			background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
			border: none;
			border-radius: 10px;
			padding: 11px 16px;
			font-size: 14px;
			font-weight: 700;
			color: white;
			width: 100%;
			transition: all .2s;
			box-shadow: 0 4px 12px rgba(37,99,235,0.25);
			margin-top: 8px;
			margin-bottom: 16px;
		}
		
		.btn-register:hover {
			opacity: 0.95;
			box-shadow: 0 6px 16px rgba(37,99,235,0.35);
			transform: translateY(-2px);
			color: white;
		}
		
		.invalid-feedback {
			display: block;
			font-size: 12px;
			margin-top: 4px;
			color: #ef4444;
		}
		
		.register-footer {
			text-align: center;
			padding-top: 16px;
			border-top: 1px solid var(--border);
			font-size: 13px;
		}
		
		.register-footer a {
			color: var(--primary);
			text-decoration: none;
			font-weight: 600;
		}
		
		.register-footer a:hover {
			text-decoration: underline;
		}
		
		.alert {
			border: none;
			border-radius: 10px;
			margin-bottom: 20px;
			font-size: 13px;
			font-weight: 500;
		}
		
		.alert-danger {
			background: #fef2f2;
			color: #991b1b;
			border-left: 4px solid #ef4444;
		}
	</style>
</head>
<body>

<div class="register-container">
	<div class="register-card">
		<!-- Header -->
		<div class="register-header">
			<div class="brand-logo">
				<i class="fas fa-check-square"></i>
			</div>
			<h1 class="brand-title">TaskFlow</h1>
			<p class="register-subtitle">Create your account</p>
		</div>
		
		<!-- Error Alert -->
		<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
			<i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
			<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
		</div>
		
		<!-- Register Form -->
		<form method="post" th:action="@{/register}" th:object="${user}">
			<!-- Full Name -->
			<div class="form-group">
				<div class="form-floating">
					<input class="form-control" type="text" id="fullname" th:field="*{name}" placeholder="Full Name"
						th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" required>
					<label for="fullname"><i class="fas fa-user me-2"></i>Full Name</label>
					<div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="invalid-feedback"></div>
				</div>
			</div>
			
			<!-- Email -->
			<div class="form-group">
				<div class="form-floating">
					<input class="form-control" type="email" id="email" th:field="*{email}" placeholder="Email"
						th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" required>
					<label for="email"><i class="fas fa-envelope me-2"></i>Email Address</label>
					<div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="invalid-feedback"></div>
				</div>
			</div>
			
			<!-- Address -->
			<div class="form-group">
				<div class="form-floating">
					<input class="form-control" type="text" id="address" th:field="*{address}" placeholder="Address"
						th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'">
					<label for="address"><i class="fas fa-map-marker-alt me-2"></i>Address</label>
					<div th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="invalid-feedback"></div>
				</div>
			</div>
			
			<!-- Password -->
			<div class="form-group">
				<div class="form-floating">
					<input class="form-control" type="password" id="password" th:field="*{password}" placeholder="Password"
						th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" required>
					<label for="password"><i class="fas fa-lock me-2"></i>Password</label>
					<div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="invalid-feedback"></div>
				</div>
			</div>
			
			<button type="submit" class="btn btn-register">
				<i class="fas fa-arrow-right me-2"></i>Create Account
			</button>
		</form>
		
		<!-- Footer -->
		<div class="register-footer">
			Already have an account? <a href="/login">Sign in here</a>
		</div>
	</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
