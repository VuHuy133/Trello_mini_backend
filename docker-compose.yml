version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: trello-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-trello}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --skip-name-resolve
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      timeout: 10s
      retries: 5
      interval: 5s
      start_period: 30s
    networks:
      - trello-network
    restart: on-failure:3

  redis:
    image: redis:7-alpine
    container_name: trello-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5
      interval: 5s
      start_period: 10s
    networks:
      - trello-network
    restart: on-failure:3

  mailpit:
    image: axllent/mailpit:latest
    container_name: trello-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - trello-network
    restart: on-failure:3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trello-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/trello
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      SPRING_DATA_REDIS_HOST: trello-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    ports:
      - "8088:8088"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - trello-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/health"] 
      timeout: 10s
      retries: 5
      interval: 10s
      start_period: 30s

  frontend:
    image: node:20-alpine
    container_name: trello-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://app:8088
    depends_on:
      - app
    networks:
      - trello-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

networks:
  trello-network:
    driver: bridge
